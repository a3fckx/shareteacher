services:
  postgres:
    image: postgres:16-alpine
    container_name: shareteacher-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: shareteacher
      POSTGRES_PASSWORD: shareteacher
      POSTGRES_DB: shareteacher
    ports:
      - "5433:5432"
    volumes:
      - ./.pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareteacher -d shareteacher"]
      interval: 5s
      timeout: 3s
      retries: 10

  # browser-use sidecar (FastAPI). Attaches to the Kernel browser over CDP and
  # exposes the HTTP endpoints the Next app calls. Not started by `db:up`; bring
  # it up explicitly with: docker compose up -d browser_agent
  browser_agent:
    build: ./browser_agent
    container_name: shareteacher-browser-agent
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      BROWSER_AGENT_HOST: "0.0.0.0"
      BROWSER_AGENT_PORT: "8700"
    ports:
      - "8700:8700"
